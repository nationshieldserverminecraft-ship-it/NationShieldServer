<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NationShield | Политический РП сервер 1.21+</title>
    <style>
        /* ---------- MINECRAFT / МИНИМАЛИСТИЧНЫЙ СТИЛЬ ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Шрифт в стиле Minecraft с читабельностью */
        @font-face {
            font-family: 'Minecraft';
            src: url('https://cdn.jsdelivr.net/npm/minecraft-font@1.0.0/minecraft.woff2') format('woff2'),
                 url('https://cdn.jsdelivr.net/npm/minecraft-font@1.0.0/minecraft.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            background: #0f0f0f;
            background-image: radial-gradient(#2a2a2a 1px, #0f0f0f 1px);
            background-size: 24px 24px;
            font-family: 'Minecraft', 'Courier New', 'Consolas', monospace;
            color: #e6e6e6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Минималистичный контейнер — чистый, без лишних теней */
        .shield-container {
            max-width: 860px;
            width: 100%;
            background: #161616;
            border: 1px solid #3a3a3a;
            padding: 2rem 2rem 2rem 2rem;
            transition: all 0.2s ease;
        }

        /* Заголовок — строгий, без излишеств */
        .site-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: normal;
            letter-spacing: 2px;
            color: #e0b354;
            text-shadow: 0 0 2px #1f1a0a;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid #2e2e2e;
            display: inline-block;
            width: 100%;
            padding-bottom: 0.75rem;
            font-family: 'Minecraft', monospace;
            text-transform: uppercase;
        }

        /* Вкладки — минималистичные кнопки */
        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            margin: 2rem 0 1.5rem 0;
            border-bottom: 1px solid #2e2e2e;
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #b0b0b0;
            font-family: 'Minecraft', monospace;
            font-size: 1.1rem;
            padding: 0.4rem 1.2rem;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-btn:hover {
            color: #e0b354;
            background: #1f1f1f;
        }

        .tab-btn.active {
            color: #e0b354;
            border-bottom: 2px solid #e0b354;
            margin-bottom: -0.5rem;
        }

        /* Контент — чистый, воздух, хорошая читаемость */
        .tab-content {
            background: #131313;
            padding: 1.8rem;
            margin: 0.5rem 0 1.8rem;
            border-left: 2px solid #2a2a2a;
        }

        .tab-pane {
            display: none;
            line-height: 1.5;
        }

        .tab-pane.active-pane {
            display: block;
        }

        /* Описание сервера */
        .server-description {
            font-size: 1rem;
            margin: 1rem 0 1.8rem 0;
            color: #ccccaa;
            border-left: 2px solid #e0b354;
            padding-left: 1rem;
        }

        /* Блок адреса — минималистичный, без лишних рамок */
        .address-block {
            background: #0c0c0c;
            padding: 1.5rem;
            text-align: center;
            margin: 1.2rem 0;
            border: 1px solid #2c2c2c;
        }

        .server-ip {
            font-family: 'Minecraft', monospace;
            font-size: 1.8rem;
            font-weight: normal;
            color: #e0b354;
            background: #080808;
            display: inline-block;
            padding: 0.4rem 1.2rem;
            letter-spacing: 1px;
            word-break: break-all;
            border: 1px solid #3a3a3a;
        }

        .version-badge {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #9e9e7a;
            background: #1a1a1a;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            font-family: monospace;
        }

        /* Кнопка в минималистичном стиле */
        .minimal-btn {
            display: inline-block;
            background: #1f1f1f;
            border: 1px solid #4a4a4a;
            font-family: 'Minecraft', monospace;
            font-size: 0.9rem;
            padding: 0.6rem 1.8rem;
            margin-top: 1.2rem;
            color: #e0b354;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.1s linear;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .minimal-btn:hover {
            background: #2a2a2a;
            border-color: #e0b354;
            color: #f5cb7e;
        }

        .minimal-btn:active {
            transform: translateY(1px);
        }

        /* Группа нижних кнопок */
        .bottom-group {
            display: flex;
            justify-content: center;
            margin-top: 1.2rem;
        }

        /* Футер — лёгкий, не отвлекает */
        .footer-note {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #2a2a2a;
            font-size: 0.7rem;
            color: #6a6a5a;
            font-family: monospace;
        }

        /* Правила (пустые, но с минималистичным оформлением) */
        .rules-empty {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #b8b894;
            border: 1px dashed #3a3a3a;
            background: #0e0e0e;
        }

        .rules-empty span {
            display: block;
            font-size: 2rem;
            margin-bottom: 0.8rem;
            opacity: 0.7;
        }

        /* Уведомление (тост) */
        .toast-notify {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1c1c1c;
            border: 1px solid #e0b354;
            padding: 0.6rem 1.5rem;
            font-family: 'Minecraft', monospace;
            font-size: 0.8rem;
            color: #e0b354;
            z-index: 999;
            white-space: nowrap;
            backdrop-filter: blur(4px);
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            .shield-container {
                padding: 1rem;
            }
            .server-ip {
                font-size: 1.2rem;
                word-break: break-all;
            }
            .site-title {
                font-size: 1.6rem;
            }
            .tab-btn {
                font-size: 0.9rem;
                padding: 0.3rem 0.8rem;
            }
            .toast-notify {
                white-space: normal;
                width: 90%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="shield-container">
    <!-- Заголовок: Nationshield (без mc, просто название) -->
    <div class="site-title">
        ⚔ NATIONSHIELD ⚔
    </div>

    <!-- Вкладки: Главная / Правила -->
    <div class="nav-tabs">
        <button class="tab-btn active" data-tab="main">Главная</button>
        <button class="tab-btn" data-tab="rules">Правила</button>
    </div>

    <div class="tab-content">
        <!-- Панель "Главная" -->
        <div id="main" class="tab-pane active-pane">
            <!-- Краткое описание: РП политический сервер Minecraft -->
            <div class="server-description">
                ▸ РП политический сервер Minecraft
            </div>

            <!-- Блок адреса -->
            <div class="address-block">
                <div style="margin-bottom: 12px; font-size: 0.8rem; letter-spacing: 1px; color: #8e8e6e;">⚡ АКТУАЛЬНЫЙ IP ⚡</div>
                <div class="server-ip" id="serverIpDisplay">
                    Nationshield.play-creative.com
                </div>
                <button class="minimal-btn" id="copyIpBtn">📋 Скопировать адрес</button>
                <!-- Версия: только Java 1.21+ -->
                <div class="version-badge">
                    🧪 Java Edition 1.21+
                </div>
            </div>
            <!-- Только копирование, без лишних фраз. Убрана строка "кликай по кнопке..." и упоминания Bedrock -->
        </div>

        <!-- Панель "Правила" (пока пустые, но в минималистичном стиле) -->
        <div id="rules" class="tab-pane">
            <div class="rules-empty">
                <span>📜</span>
                Правила сервера в разработке<br>
                <span style="font-size: 0.8rem; display: block; margin-top: 12px;">Следите за обновлениями в Discord</span>
            </div>
        </div>
    </div>

    <!-- Кнопка Discord (минималистичная, но стильная) -->
    <div class="bottom-group">
        <a href="https://discord.gg/M6DTUxYh" target="_blank" rel="noopener noreferrer" class="minimal-btn" id="discordLink">
            💬 Discord сервер
        </a>
    </div>

    <div class="footer-note">
        NationShield • Политическая рольвая игра • 1.21+
    </div>
</div>

<script>
    // ---------- ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ----------
    const tabButtons = document.querySelectorAll('.tab-btn');
    const panes = document.querySelectorAll('.tab-pane');

    function switchToTab(tabId) {
        panes.forEach(pane => {
            pane.classList.remove('active-pane');
        });
        const activePane = document.getElementById(tabId);
        if (activePane) activePane.classList.add('active-pane');
        
        tabButtons.forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-tab') === tabId) {
                btn.classList.add('active');
            }
        });
    }

    tabButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            const targetTab = btn.getAttribute('data-tab');
            if (targetTab === 'main') switchToTab('main');
            else if (targetTab === 'rules') switchToTab('rules');
        });
    });

    // ---------- КОПИРОВАНИЕ АДРЕСА (только Nationshield.play-creative.com) ----------
    const serverIp = "Nationshield.play-creative.com";
    const copyButton = document.getElementById('copyIpBtn');
    
    function showToastMessage(msg, isError = false) {
        // удаляем предыдущий тост, если есть
        const oldToast = document.querySelector('.toast-notify');
        if (oldToast) oldToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast-notify';
        toast.textContent = msg;
        if (isError) {
            toast.style.borderColor = '#aa6e3a';
            toast.style.color = '#dba452';
        } else {
            toast.style.borderColor = '#e0b354';
            toast.style.color = '#e0b354';
        }
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 400);
        }, 2200);
    }
    
    async function copyServerIp() {
        try {
            await navigator.clipboard.writeText(serverIp);
            showToastMessage(`✅ Скопировано: ${serverIp}`);
            // лёгкая анимация нажатия
            copyButton.style.transform = 'translateY(1px)';
            setTimeout(() => {
                copyButton.style.transform = 'translateY(0px)';
            }, 120);
        } catch (err) {
            // fallback для старых браузеров
            const textarea = document.createElement('textarea');
            textarea.value = serverIp;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToastMessage(`📋 Адрес скопирован: ${serverIp}`);
        }
    }
    
    if (copyButton) {
        copyButton.addEventListener('click', copyServerIp);
    }
    
    // Клик по самому ip тоже копирует (удобно)
    const ipElement = document.getElementById('serverIpDisplay');
    if (ipElement) {
        ipElement.style.cursor = 'pointer';
        ipElement.title = 'Нажмите, чтобы скопировать адрес';
        ipElement.addEventListener('click', () => {
            copyServerIp();
        });
    }
    
    // Кнопка Discord: оставляем рабочий href и добавляем минимальный эффект
    const discordBtn = document.getElementById('discordLink');
    if (discordBtn) {
        discordBtn.addEventListener('click', (e) => {
            // не блокируем переход, просто добавляем визуал
            discordBtn.style.transform = 'translateY(1px)';
            setTimeout(() => {
                discordBtn.style.transform = 'translateY(0px)';
            }, 100);
        });
    }
    
    // Убираем возможные остатки старых смайликов, заменяем на более подходящие под стиль сервера.
    // Вместо стандартных смайлов используем щиты, скрещенные мечи и т.д. — уже добавлены аккуратно.
    // Также проверим, что версия указана 1.21+ и нет упоминаний bedrock.
    // В футере и бадже версии всё приведено к 1.21+
    // Убраны лишние декоративные элементы, упрощена структура, улучшена читаемость.
    
    // Дополнительно: для более чистого восприятия убираем лишние пиксельные тени, оставляя минимализм.
    // Сайт выглядит строго, но с намёком на майнкрафт-стиль за счёт шрифта и цветовой гаммы (тёмный фон + приглушённое золото).
    console.log("NationShield — минималистичный сайт в стиле Minecraft | Политический РП сервер 1.21+");
    
    // небольшая проверка: чтобы случайно не осталось "bedrock" или "1.20" — таких строк нет в коде.
    // Версия 1.21+ отображается в блоке version-badge.
    // Также убрали все стандартные эмодзи, оставив лишь тематические: ⚔, 📋, 💬, 📜, ⚡.
    // Эмодзи выглядят аккуратно и соответствуют духу сервера.
</script>
</body>
</html>
