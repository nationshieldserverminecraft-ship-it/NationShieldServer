<!DOCTYPE html>
<html>
<head>
    <title>Test Sound</title>
</head>
<body>
    <button id="testBtn">Нажми сюда</button>
    
    <script>
        // ПРЯМАЯ ССЫЛКА НА ТВОЙ ФАЙЛ (правильная)
        const sound = new Audio('https://raw.githubusercontent.com/nationshieldserverminecraft-ship-it/NationShieldServer/main/off-button-on-table-lamp.mp3');
        
        document.getElementById('testBtn').onclick = () => {
            sound.currentTime = 0;
            sound.play().then(() => {
                alert('Звук проигрался!');
            }).catch(e => {
                alert('Ошибка: ' + e.message);
            });
        };
    </script>
</body>
</html>
